<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Horizon Link Technologies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .logo h1 span {
            color: #00c2ff;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 40px 36px;
        }

        .card h2 {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 13px;
            color: #666;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #00c2ff;
        }

        .error {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #ff5050;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: #00c2ff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: #00a8dd;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo">
            <h1>HORIZON LINK <span>TECHNOLOGIES</span></h1>
            <p>Admin Portal</p>
        </div>

        <div class="card">
            <h2>Welcome back</h2>
            <p>Sign in to access the admin dashboard</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
        </div>

        <div class="footer-note">
            &copy; 2025 Horizon Link Technologies. All rights reserved.
        </div>
    </div>
</body>
</html>
